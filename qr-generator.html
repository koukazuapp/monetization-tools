<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRコード生成器 - 無料</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        
        .app-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover { background: #5568d3; }
        
        #qrcode {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .ad-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }
        .ad-label { font-size: 12px; color: #999; margin-bottom: 10px; }
        
        .footer {
            text-align: center;
            color: white;
            padding: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 QRコード生成器</h1>
            <p>無料でQRコードを作成</p>
        </div>
        
        <div class="app-container">
            <input type="text" id="textInput" placeholder="URLやテキストを入力..." />
            <button id="generateBtn">QRコード生成</button>
            <div id="qrcode"></div>
        </div>
        
        <div class="ad-container">
            <div class="ad-label">広告</div>
            <!-- admax -->
            <script src="https://adm.shinobi.jp/s/ab4b5665c6d20f45f10dc53cfda016de"></script>
            <!-- admax -->
        </div>
        
        <div class="footer">
            <p>© 2026 QRコード生成器 | 無料でご利用いただけます</p>
        </div>
    </div>
    
    <script>
        const textInput = document.getElementById('textInput');
        const generateBtn = document.getElementById('generateBtn');
        const qrcode = document.getElementById('qrcode');
        
        generateBtn.addEventListener('click', () => {
            const text = textInput.value.trim();
            if (!text) {
                alert('テキストを入力してください');
                return;
            }
            
            qrcode.innerHTML = '';
            new QRCode(qrcode, {
                text: text,
                width: 200,
                height: 200
            });
        });
        
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateBtn.click();
        });
    </script>
</body>
</html>
