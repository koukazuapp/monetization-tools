<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード生成器 - 無料</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        
        .app-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        .option {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input[type="range"] {
            width: 100%;
            margin-bottom: 10px;
        }
        
        input[type="checkbox"] {
            margin-right: 10px;
        }
        
        .password-display {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 18px;
            word-break: break-all;
            text-align: center;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 10px;
        }
        
        button:hover { background: #5568d3; }
        
        .ad-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }
        .ad-label { font-size: 12px; color: #999; margin-bottom: 10px; }
        
        .footer {
            text-align: center;
            color: white;
            padding: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 パスワード生成器</h1>
            <p>安全なパスワードを無料で生成</p>
        </div>
        
        <div class="app-container">
            <div class="option">
                <label>長さ: <span id="lengthValue">16</span></label>
                <input type="range" id="length" min="8" max="64" value="16" />
            </div>
            
            <div class="option">
                <label><input type="checkbox" id="uppercase" checked> 大文字 (A-Z)</label>
            </div>
            
            <div class="option">
                <label><input type="checkbox" id="lowercase" checked> 小文字 (a-z)</label>
            </div>
            
            <div class="option">
                <label><input type="checkbox" id="numbers" checked> 数字 (0-9)</label>
            </div>
            
            <div class="option">
                <label><input type="checkbox" id="symbols" checked> 記号 (!@#$%^&*)</label>
            </div>
            
            <button id="generateBtn">パスワード生成</button>
            <button id="copyBtn">コピー</button>
            
            <div class="password-display" id="passwordDisplay"></div>
        </div>
        
        <div class="ad-container">
            <div class="ad-label">広告</div>
            <!-- admax -->
            <script src="https://adm.shinobi.jp/s/ab4b5665c6d20f45f10dc53cfda016de"></script>
            <!-- admax -->
        </div>
        
        <div class="footer">
            <p>© 2026 パスワード生成器 | 無料でご利用いただけます</p>
        </div>
    </div>
    
    <script>
        const lengthSlider = document.getElementById('length');
        const lengthValue = document.getElementById('lengthValue');
        const uppercase = document.getElementById('uppercase');
        const lowercase = document.getElementById('lowercase');
        const numbers = document.getElementById('numbers');
        const symbols = document.getElementById('symbols');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const passwordDisplay = document.getElementById('passwordDisplay');
        
        lengthSlider.addEventListener('input', () => {
            lengthValue.textContent = lengthSlider.value;
        });
        
        function generatePassword() {
            const length = parseInt(lengthSlider.value);
            let chars = '';
            
            if (uppercase.checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (lowercase.checked) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (numbers.checked) chars += '0123456789';
            if (symbols.checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
            
            if (chars === '') {
                alert('少なくとも1つのオプションを選択してください');
                return;
            }
            
            let password = '';
            for (let i = 0; i < length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            passwordDisplay.textContent = password;
        }
        
        generateBtn.addEventListener('click', generatePassword);
        
        copyBtn.addEventListener('click', () => {
            if (passwordDisplay.textContent) {
                navigator.clipboard.writeText(passwordDisplay.textContent);
                alert('コピーしました');
            }
        });
        
        generatePassword();
    </script>
</body>
</html>
